[project]
name = "goodomics-server"
version = "0.1.0"
description = "Optional Goodomics server for hosted and team QC context"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "FSL-1.1-Apache-2.0" }
authors = [
  { name = "Goodomics contributors" }
]
dependencies = [
  "goodomics",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "sqlalchemy>=2",
  "alembic>=1.13",
  "pydantic-settings>=2",
  "mcp>=1.27,<2",
  "typer>=0.12",
  "rich>=13",
]

[project.optional-dependencies]
sqlite = [
  "aiosqlite>=0.19",
]
postgres = [
  "psycopg[binary]>=3.2",
]
mysql = [
  "aiomysql>=0.3.2",
]
all-db = [
  "aiosqlite>=0.19",
  "psycopg[binary]>=3.2",
  "aiomysql>=0.3.2",
]
dev = [
  "httpx",
  "pytest",
  "pytest-asyncio",
  "ruff",
  "pyright",
]

[tool.uv.sources]
goodomics = { workspace = true }

[project.urls]
Homepage = "https://goodomics.com"
Repository = "https://github.com/murphycj/goodomics"

[project.scripts]
goodomics-server = "goodomics_server.cli:app"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goodomics_server"]
