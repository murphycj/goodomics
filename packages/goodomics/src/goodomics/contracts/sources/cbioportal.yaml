source:
  id: cbioportal
  kind: source
  name: cBioPortal
contracts:
  - data_contract_id: cbioportal:clinical:patient_attributes
    name: cBioPortal patient clinical attributes
    data_type: entity_attributes
    producer_tool: cbioportal
    value_type: mixed
    primary_table: entity_attributes
    physical_tables: [entity_attributes]
    query_modes: [subject, attribute]
    mcp_description: Patient-level clinical attributes imported from cBioPortal.
    metadata_json: &cbio_metadata
      contract_scope: semantic_contract
      source_format: cbioportal
  - data_contract_id: cbioportal:clinical:sample_attributes
    name: cBioPortal sample clinical attributes
    data_type: entity_attributes
    producer_tool: cbioportal
    value_type: mixed
    primary_table: entity_attributes
    physical_tables: [entity_attributes]
    query_modes: [sample, attribute]
    mcp_description: Sample-level clinical attributes imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:copy_number:segments
    name: cBioPortal copy-number segments
    data_type: copy_number_segments
    producer_tool: cbioportal
    feature_type: interval
    value_type: numeric
    primary_table: copy_number_segments
    physical_tables: [copy_number_segments]
    query_modes: [sample, region]
    mcp_description: Segment-level copy-number values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:copy_number:discrete_calls
    name: cBioPortal discrete copy-number calls
    data_type: feature_calls
    producer_tool: cbioportal
    feature_type: gene
    value_type: call
    primary_table: feature_call
    physical_tables: [feature_call]
    query_modes: [sample, feature, call, cohort]
    mcp_description: Gene-level discrete copy-number calls imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:copy_number:continuous
    name: cBioPortal continuous copy-number values
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: gene
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Gene-level continuous copy-number values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:copy_number:log2
    name: cBioPortal log2 copy-number values
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: gene
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Gene-level log2 copy-number values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:mutations:maf
    name: cBioPortal mutation calls
    data_type: small_variants
    producer_tool: cbioportal
    feature_type: gene
    value_type: call
    primary_table: sample_variant_calls
    physical_tables: [sample_variant_calls]
    query_modes: [sample, variant, gene, region]
    mcp_description: Small-variant calls imported from cBioPortal MAF files.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:mrna_expression:continuous
    name: cBioPortal mRNA expression values
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: gene
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Continuous mRNA expression values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:mrna_expression:z_score
    name: cBioPortal mRNA expression z-scores
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: gene
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: mRNA expression z-scores imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:methylation:continuous_beta
    name: cBioPortal methylation beta values
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: gene
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Continuous methylation beta values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:protein_level:log2
    name: cBioPortal protein abundance values
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: protein
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Continuous protein abundance values imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:protein_level:z_score
    name: cBioPortal protein abundance z-scores
    data_type: feature_matrix
    producer_tool: cbioportal
    feature_type: protein
    value_type: numeric
    primary_table: feature_value_numeric
    physical_tables: [feature_value_numeric]
    query_modes: [sample, feature, cohort]
    mcp_description: Protein abundance z-scores imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:structural_variants
    name: cBioPortal structural variants
    data_type: structural_variants
    producer_tool: cbioportal
    feature_type: gene
    value_type: call
    primary_table: sample_structural_variant_calls
    physical_tables: [sample_structural_variant_calls]
    query_modes: [sample, feature, region]
    mcp_description: Structural-variant calls imported from cBioPortal.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:gene_panel_matrix
    name: cBioPortal gene panel matrix
    data_type: contract_payload
    producer_tool: cbioportal
    value_type: matrix
    primary_table: contract_payloads
    physical_tables: [contract_payloads]
    query_modes: [payload, sample, contract]
    mcp_description: cBioPortal gene panel coverage matrix payload.
    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:generic_assay:limit_value
