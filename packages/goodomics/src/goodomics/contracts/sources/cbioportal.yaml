    metadata_json: *cbio_metadata
  - data_contract_id: cbioportal:generic_assay:categorical
    name: cBioPortal generic assay categorical values
    data_type: contract_payload
    producer_tool: cbioportal
    value_type: categorical
    primary_table: contract_payloads
    physical_tables: [contract_payloads]
    query_modes: [payload, sample, feature]
