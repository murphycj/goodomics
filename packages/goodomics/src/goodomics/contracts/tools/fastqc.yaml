source:
  id: fastqc
  kind: tool
  name: FastQC
contracts:
  - data_contract_id: fastqc:raw:metrics
    name: FastQC raw metrics
    data_type: generic_metrics
    producer_tool: fastqc
    feature_type: metric
    value_type: mixed
    entity_grain: run_sample
    primary_table: sample_metrics
    physical_tables: [sample_metrics]
    query_modes: [sample, metric, cohort]
    mcp_description: Sample-level metrics from FastQC raw outputs.
    metadata_json:
      contract_scope: semantic_contract
      contract_family: tool_output
      tool: fastqc
      tool_context: raw
    fields:
      - field_id: general_stats.fastqc_raw_percent_gc
        entity_scope: run_sample
        display_name: Percent GC
        value_type: numeric
        unit: percent
        query_ref_json:
          table: sample_metrics
          field_column: field_id
          field_value: general_stats.fastqc_raw_percent_gc
          value_column: value_numeric
        metadata_json:
          producer_tool: fastqc
          producer_module: general_stats
          tool_context: raw
          multiqc_module: general_stats
      - field_id: general_stats.fastqc_raw_total_sequences
        entity_scope: run_sample
        display_name: Total sequences
        value_type: numeric
        query_ref_json:
          table: sample_metrics
          field_column: field_id
          field_value: general_stats.fastqc_raw_total_sequences
          value_column: value_numeric
        metadata_json:
          producer_tool: fastqc
          producer_module: general_stats
          tool_context: raw
          multiqc_module: general_stats
  - data_contract_id: fastqc:raw:payloads
    name: FastQC raw result payloads
    data_type: result_payload
    producer_tool: fastqc
    value_type: table
    entity_grain: run
    primary_table: result_payloads
    physical_tables: [result_payloads]
    query_modes: [payload]
    mcp_description: Source tables and plot payloads from FastQC raw outputs.
    metadata_json:
      contract_scope: semantic_contract
      contract_family: tool_output
      tool: fastqc
      tool_context: raw
