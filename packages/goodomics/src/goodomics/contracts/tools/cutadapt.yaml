source:
  id: cutadapt
  kind: tool
  name: Cutadapt
contracts:
  - data_contract_id: cutadapt:metrics
    name: Cutadapt metrics
    data_type: generic_metrics
    producer_tool: cutadapt
    feature_type: metric
    value_type: mixed
    entity_grain: run_sample
    primary_table: sample_metrics
    physical_tables: [sample_metrics]
    query_modes: [sample, metric, cohort]
    mcp_description: Sample-level metrics from Cutadapt outputs.
    metadata_json:
      contract_scope: semantic_contract
      contract_family: tool_output
      tool: cutadapt
      tool_context:
  - data_contract_id: cutadapt:payloads
    name: Cutadapt result payloads
    data_type: result_payload
    producer_tool: cutadapt
    value_type: table
    entity_grain: run
    primary_table: result_payloads
    physical_tables: [result_payloads]
    query_modes: [payload]
    mcp_description: Source tables and plot payloads from Cutadapt outputs.
    metadata_json:
      contract_scope: semantic_contract
      contract_family: tool_output
      tool: cutadapt
      tool_context:
