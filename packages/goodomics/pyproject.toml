[project]
name = "goodomics-core"
version = "0.1.0"
description = "Core SDK, CLI, schemas, reporting, storage, and optional server runtime for Goodomics"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "Goodomics contributors" }
]
dependencies = [
  "duckdb>=1.0",
  "pydantic>=2",
  "sqlmodel>=0.0.24",
  "typer>=0.12",
  "rich>=13",
  "pyyaml>=6",
]

[project.optional-dependencies]
reports = [
  "jinja2>=3",
  "plotly>=5",
]
tables = [
  "pandas>=2",
]
db = [
  "sqlmodel>=0.0.24",
  "alembic>=1.13",
]
sqlite = [
  "sqlmodel>=0.0.24",
  "alembic>=1.13",
  "aiosqlite>=0.19",
]
postgres = [
  "sqlmodel>=0.0.24",
  "alembic>=1.13",
  "psycopg[binary]>=3.2",
]
mysql = [
  "sqlmodel>=0.0.24",
  "alembic>=1.13",
  "aiomysql>=0.3.2",
]
server = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "greenlet>=3",
  "alembic>=1.13",
  "pydantic-settings>=2",
  "aiosqlite>=0.19",
  "mcp>=1.27,<2",
  "pwdlib[argon2]>=0.3",
  "PyJWT>=2.10",
  "limits>=5",
  "redis>=5",
  "python-multipart>=0.0.20",
  "boto3>=1.35",
]
all = [
  "jinja2>=3",
  "plotly>=5",
  "pandas>=2",
  "sqlmodel>=0.0.24",
  "alembic>=1.13",
  "aiosqlite>=0.19",
  "psycopg[binary]>=3.2",
  "aiomysql>=0.3.2",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "greenlet>=3",
  "pydantic-settings>=2",
  "mcp>=1.27,<2",
  "pwdlib[argon2]>=0.3",
  "PyJWT>=2.10",
  "limits>=5",
  "redis>=5",
  "python-multipart>=0.0.20",
  "boto3>=1.35",
]
dev = [
  "pytest",
  "ruff",
  "pyright",
]

[project.urls]
Homepage = "https://goodomics.com"
Repository = "https://github.com/murphycj/goodomics"

[project.scripts]
goodomics = "goodomics.cli:app"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goodomics"]

[tool.hatch.build.targets.sdist]
artifacts = [
  "src/goodomics/server/web/static/**",
]
