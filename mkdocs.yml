site_name: Goodomics Docs
site_description: Open-source Goodomics documentation for CLI, SDK, server, dashboard, reports, and deployment.
site_url: https://www.goodomics.com/docs/
repo_url: https://github.com/murphycj/goodomics
repo_name: murphycj/goodomics
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/search-shortcut.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/goodomics/src
          options:
            docstring_style: google
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      title: On this page
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Get started:
      - Overview: index.md
      - Getting started: getting-started.md
  - Concepts:
      - Data model and storage: concepts/architecture.md
      - Data contracts and fields: concepts/data-contracts.md
  - Interfaces:
      - CLI: interfaces/cli.md
      - Python SDK: interfaces/sdk.md
      - Python SDK API: interfaces/sdk-api.md
      - Custom parsers: interfaces/custom-parsers.md
      - Server: interfaces/server.md
      - Dashboard: interfaces/dashboard.md
      - MCP integration: interfaces/mcp.md
  - Insights and reports:
      - Overview: reports/index.md
      - Python and API usage: reports/python-api.md
      - Configuration reference: reports/configuration.md
      - Compilation and execution: reports/execution.md
      - Templates and rendering: reports/report-templates.md
  - Operations:
      - Database backends: operations/database-backends.md
      - Deployment: operations/deployment.md
      - Development workflow: operations/development.md
